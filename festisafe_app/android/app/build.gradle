plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

android {
    namespace "com.festisafe.festisafe"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    // Keystore de producción — lee desde variables de entorno o key.properties
    // Para generar el keystore:
    //   keytool -genkey -v -keystore festisafe-release.jks -keyalg RSA -keysize 2048 -validity 10000 -alias festisafe
    // Luego crear festisafe_app/android/key.properties con:
    //   storePassword=<password>
    //   keyPassword=<password>
    //   keyAlias=festisafe
    //   storeFile=../festisafe-release.jks
    def keystorePropertiesFile = rootProject.file("key.properties")
    def keystoreProperties = new Properties()
    def hasKeystore = keystorePropertiesFile.exists()
    if (hasKeystore) {
        keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
    }

    signingConfigs {
        release {
            if (hasKeystore) {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            } else {
                // Fallback a debug signing si no hay keystore (builds de CI sin firma)
                keyAlias signingConfigs.debug.keyAlias
                keyPassword signingConfigs.debug.keyPassword
                storeFile signingConfigs.debug.storeFile
                storePassword signingConfigs.debug.storePassword
            }
        }
    }

    defaultConfig {
        applicationId "com.festisafe.festisafe"
        minSdk 24  // Android 7.0+ — requerido por flutter_background_service y BLE
        targetSdk flutter.targetSdkVersion
        versionCode flutter.versionCode
        versionName flutter.versionName
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"
}
