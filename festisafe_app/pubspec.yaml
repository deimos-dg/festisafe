name: festisafe
description: App móvil de seguridad para festivales de música.
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Estado
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navegación
  go_router: ^13.2.0

  # HTTP
  dio: ^5.4.3+1

  # WebSocket
  web_socket_channel: ^2.4.0

  # Almacenamiento seguro
  flutter_secure_storage: ^9.0.0

  # Mapas
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_map_tile_caching: ^9.1.0

  # Ubicación GPS
  geolocator: ^11.0.0

  # Notificaciones locales
  flutter_local_notifications: ^17.1.2

  # Notificaciones push (FCM)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Servicio en segundo plano (GPS + WS con app cerrada)
  flutter_background_service: ^5.0.5

  # QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1

  # Batería
  battery_plus: ^6.0.1

  # Sensores (brújula)
  sensors_plus: ^4.0.2

  # Utilidades
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  share_plus: ^12.0.1
  url_launcher: ^6.2.5
  image_picker: ^1.1.2
  path_provider: ^2.1.4

  # Bluetooth BLE (proximidad de grupo + SOS offline)
  flutter_blue_plus: ^1.32.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  mockito: ^5.4.4
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/avatars/
