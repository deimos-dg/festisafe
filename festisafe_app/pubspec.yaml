name: festisafe
description: App móvil de seguridad para festivales de música.
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 🔹 Estado
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5
  riverpod_generator: ^2.3.5

  # 🔹 Navegación
  go_router: ^17.1.0

  # 🔹 Networking
  dio: ^5.4.3+1
  web_socket_channel: ^3.0.3

  # 🔹 Almacenamiento
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.2.3

  # 🔹 Mapas y ubicación
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  flutter_map_tile_caching: ^10.1.1
  geolocator: ^14.0.2

  # 🔹 Firebase
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3

  # 🔹 Notificaciones locales
  flutter_local_notifications: ^17.1.2

  # 🔹 Permisos
  permission_handler: ^12.0.1

  # 🔹 Multimedia / UI
  image_picker: ^1.1.2
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0
  share_plus: ^12.0.1
  url_launcher: ^6.2.5

  # 🔹 Sensores y sistema
  battery_plus: ^7.0.0
  sensors_plus: ^7.0.0
  path_provider: ^2.1.4

  # 🔹 Bluetooth
  flutter_blue_plus: ^2.2.1

  # 🔹 Utilidades
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.9
  riverpod_generator: ^2.3.5
  mockito: ^5.4.4
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

# ⚙️ Configuración del Icono
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF" # Color de fondo si el icono es transparente
  adaptive_icon_foreground: "assets/images/app_icon.png" # Imagen del logo en sí

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/avatars/
