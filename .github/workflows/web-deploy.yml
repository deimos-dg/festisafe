name: Deploy FestiSafe Web (Portal Admin)

on:
  push:
    branches: [ master ]
    paths:
      - 'festisafe_web/**'
  pull_request:
    branches: [ master ]
    paths:
      - 'festisafe_web/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './festisafe_web/package-lock.json'

      - name: Install dependencies
        run: |
          cd festisafe_web
          npm install

      - name: Build Next.js app
        run: |
          cd festisafe_web
          npm run build
        env:
          NEXT_PUBLIC_API_URL: https://festisafe-production.up.railway.app

  deploy:
    # Este paso SOLO se ejecutará si los cambios se fusionan (Merge) en Master
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway (Portal Admin)
        run: |
          npm i -g @railway/cli
          railway up --service festisafe-web
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_WEB }}
