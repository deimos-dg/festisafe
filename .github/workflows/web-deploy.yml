name: Deploy FestiSafe Web (Portal Admin)

on:
  push:
    branches: [ master ]
    paths:
      - 'festisafe_web/**'
  workflow_dispatch: # Permite disparar el despliegue manualmente desde GitHub

jobs:
  build-and-test:
    name: Build & Test Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'festisafe_web/package-lock.json'

      - name: Install dependencies
        working-directory: ./festisafe_web
        run: npm install

      - name: Build Next.js app
        working-directory: ./festisafe_web
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://festisafe-production.up.railway.app

  deploy:
    name: Cloud Deploy to Railway
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway (Portal Admin)
        working-directory: ./festisafe_web
        # Usamos el token unificado RAILWAY_TOKEN que ya actualizaste
        run: railway up --service festisafe-web --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
